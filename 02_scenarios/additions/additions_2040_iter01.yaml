    existing_line: N-L79
    add_s_nom: 600

  - name: N-L71_upgrade      # BPE->MTN at 97% in MAY, AUG
    existing_line: N-L71
    add_s_nom: 600

  # Auckland feed -- JUL and AUG
  - name: N-L123_upgrade     # WIR->OTA at 100% in JUL, AUG
    existing_line: N-L123
    add_s_nom: 600

