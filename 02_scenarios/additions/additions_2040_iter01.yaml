# additions_2040_iter01.yaml
#
# Status after setup: 7/12 adequate
# Inadequate: MAY, JUN, JUL, AUG (MIXED), SEP (GENERATION)
#
# Diagnosis summary:
#   MAY/AUG: whole-NI generation shortage + N-L79 MTN->WGN, N-L71 BPE->MTN at 100%
#   JUN:     generation shortage + N-L28 SFD->TMN, N-L18 WRK->NAP, N-L6 BPE->BRK at ~97%
#   JUL:     N-L123 WIR->OTA at 100%, S-L68/S-L69 near 100% (SI HVDC corridor)
#   AUG:     N-L25 OHK->ATI, N-L30 TWH->HLY, N-L113 CBG->HAM all at 100%
#   SEP:     generation shortage (congested lines data unavailable -- recheck if still inadequate)
#
# Strategy: add substantial firm generation at strategic NI buses,
#           upgrade all recurring transmission bottlenecks.

year: 2040
notes: "Iter 1 -- generation additions + upgrade recurring NI transmission bottlenecks"

generators:

  - name: HLY_gas_03
    bus: HLY
    p_nom: 300
    carrier: gas
    marginal_cost: 80

  - name: OTA_gas_03
    bus: OTA
    p_nom: 300
    carrier: gas
    marginal_cost: 80

  - name: HAY_gas_01
    bus: HAY
    p_nom: 200
    carrier: gas
    marginal_cost: 82

  - name: WRK_gas_01
    bus: WRK
    p_nom: 200
    carrier: gas
    marginal_cost: 82

  - name: SFD_gas_02
    bus: SFD
    p_nom: 200
    carrier: gas
    marginal_cost: 82

  - name: TWH_gas_02
    bus: TWH
    p_nom: 150
    carrier: gas
